<!DOCTYPE html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Carta 💗</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="bg"></div>

<div class="container" onclick="abrirCarta()">

  <!-- SOBRE -->
  <div class="envelope">
    <div class="top"></div>
    <div class="left"></div>
    <div class="right"></div>
    <div class="bottom"></div>
  </div>

  <!-- 💌 CARTA -->
  <div class="card">
    <p class="para">Para: Mi amor 💗</p>

    <img src="IMA/IMAGEN.jpg.jpeg" class="foto">

    <h2 class="titulo">Mi vida...</h2>

    <p class="texto">
      <span>Cuanto más tiempo estoy contigo,</span>
      <span>más te amo cada día.</span>
      <span>Eres mi lugar favorito 💗</span>
    </p>

    <p class="de">De: Tu amor 💌</p>

    <!-- 📱 QR -->
    <img src="qr.png" class="foto">
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
